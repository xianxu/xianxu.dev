# ariadne base-layer CI shim (#52). Thin and stable on purpose: it clones the
# base-layer peers, computes the PR range, and hands off to
# scripts/run-merge-checks.sh, which runs this repo's own
# scripts/merge-checks.d/* checks. The logic lives in the (symlinked,
# propagating) runner + the repo-local checks — not here.
#
# Seeded (a real file per repo, not a symlink) because GitHub Actions does not
# discover symlinked workflow files. The runner itself IS a sibling symlink into
# the base layer (../<upstream>) — absent in an isolated CI checkout — so the
# workflow first runs ./bootstrap.sh (CLONE_ONLY) to clone the upstream peer
# chain as siblings, the way any ariadne-style repo bootstraps its deps. (In the
# root repo, which has no upstream peers, the step is a guarded no-op.) Job name
# `merge-check` is stable so a branch-protection required-status-check can
# reference it generically.
name: merge-check

on:
  pull_request:
    branches: [main]

jobs:
  merge-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so merge-base + the range resolve
      - name: Clone base-layer peers (resolve the symlinked runner)
        run: |
          set -euo pipefail
          # scripts/run-merge-checks.sh is a sibling symlink into the base layer,
          # which this isolated checkout doesn't have. bootstrap.sh clones the
          # upstream peer chain as siblings (transitively); CLONE_ONLY skips the
          # heavy `make bootstrap` handoff (refresh/build/install). Peer URLs are
          # derived from origin (public base layer → no token needed). Guarded so
          # the root repo (no upstream peers) is a no-op.
          if [ -x ./bootstrap.sh ]; then
            BOOTSTRAP_CLONE_ONLY=1 ./bootstrap.sh
          fi
      - name: Run merge-checks over the PR range
        run: |
          set -euo pipefail
          base_tip="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # merge-base so a two-dot base..head diff == exactly the PR's changes
          base="$(git merge-base "$base_tip" "$head")"
          bash scripts/run-merge-checks.sh "$base" "$head"
